<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 9: Hexagonal Lattice</title>
<style>
  body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .hex-container { display: flex; flex-wrap: wrap; width: 120px; gap: 2px; justify-content: center; }
  .hex {
    width: 30px; height: 34.64px; background-color: #333; position: relative; opacity: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: hexFade 0.5s forwards;
  }
  @keyframes hexFade { to { opacity: 1; background-color: #fff; } }
</style>
</head>
<body>
  <div class="hex-container" id="hc"></div>
  <script>
    const hc = document.getElementById('hc');
    for(let i=0; i<7; i++) {
      let h = document.createElement('div');
      h.className = 'hex';
      h.style.animationDelay = (i * 0.2) + 's';
      hc.appendChild(h);
    }
  </script>
</body>
</html>
