<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 2: Minimalist Ignition</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .core {
    width: 200px;
    height: 200px;
    background-color: #fff;
    border-radius: 50%;
    position: absolute;
    animation: ignite 3s cubic-bezier(0.8, 0, 0.2, 1) forwards;
  }
  .shockwave {
    width: 200px;
    height: 200px;
    border: 2px solid #fff;
    border-radius: 50%;
    position: absolute;
    opacity: 0;
    animation: ripple 3s cubic-bezier(0.8, 0, 0.2, 1) forwards;
  }
  .text {
    position: absolute;
    color: #000;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    opacity: 0;
    z-index: 10;
    animation: textReveal 3s cubic-bezier(0.8, 0, 0.2, 1) forwards;
    mix-blend-mode: difference;
    color: white;
  }
  
  @keyframes ignite {
    0% { transform: scale(1); background-color: #fff; }
    30% { transform: scale(0.1); background-color: #fff; }
    35% { transform: scale(0.1); background-color: #fff; }
    60% { transform: scale(30); background-color: #fff; }
    100% { transform: scale(30); background-color: #0a0a0a; }
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0; }
    35% { transform: scale(0.1); opacity: 1; }
    60% { transform: scale(20); opacity: 0; border-color: #ff4f00; border-width: 10px; }
    100% { transform: scale(20); opacity: 0; }
  }

  @keyframes textReveal {
    0% { opacity: 0; }
    50% { opacity: 0; transform: scale(0.9); letter-spacing: 8px; }
    65% { opacity: 1; transform: scale(1.1); letter-spacing: 12px; }
    100% { opacity: 1; transform: scale(1); letter-spacing: 16px; }
  }
</style>
</head>
<body>
  <div class="shockwave"></div>
  <div class="core"></div>
  <div class="text">Liftoff</div>
</body>
</html>
