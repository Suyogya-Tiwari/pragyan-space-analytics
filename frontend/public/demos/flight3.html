<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo C: The Orbital Insertion (Gravity Turn)</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #0c1015; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
  
  .rocket-container {
    width: 200px; height: 400px; position: absolute; z-index: 10;
    will-change: transform;
    /* Translate container along a curve */
    animation: orbit-path 4s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  }

  .rocket-rotate {
    width: 100%; height: 100%;
    /* Rotate rocket to follow the path */
    animation: orbit-rotate 4s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  }

  .flame {
    fill: #f97316;
    transform-origin: top center;
    animation: flame-flicker 0.1s infinite alternate;
  }

  /* Orbital Grid */
  .grid {
    position: absolute; width: 150vw; height: 150vh;
    background-image: 
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    border-radius: 50%;
    transform: rotateX(70deg) translateY(200px);
  }

  @keyframes orbit-path {
    0% { transform: translate(-50vw, 100vh); }
    50% { transform: translate(0, 0); }
    100% { transform: translate(50vw, -100vh); }
  }

  @keyframes orbit-rotate {
    0% { transform: rotate(45deg); }
    50% { transform: rotate(90deg); }
    100% { transform: rotate(135deg); }
  }

  @keyframes flame-flicker {
    from { transform: scaleY(1); opacity: 0.8; }
    to { transform: scaleY(1.4); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  
  <div class="rocket-container">
    <div class="rocket-rotate">
      <svg viewBox="0 0 100 250" style="width: 100%; height: 100%;">
        <path class="flame" d="M 42 195 L 50 240 L 58 195 Z" />
        <path d="M 50 10 C 35 40 35 100 35 140 L 20 170 L 35 170 L 35 180 L 65 180 L 65 170 L 80 170 L 65 140 C 65 100 65 40 50 10 Z" fill="none" stroke="#e5e7eb" stroke-width="2"/>
        <path d="M 40 180 L 40 195 L 60 195 L 60 180" fill="none" stroke="#e5e7eb" stroke-width="2"/>
        <circle cx="50" cy="60" r="6" fill="none" stroke="#e5e7eb" stroke-width="2"/>
        <circle cx="50" cy="90" r="6" fill="none" stroke="#e5e7eb" stroke-width="2"/>
      </svg>
    </div>
  </div>
</body>
</html>
