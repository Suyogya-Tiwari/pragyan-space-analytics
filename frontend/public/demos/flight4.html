<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo D: The Hyperspace Jump</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
  
  .rocket-container {
    width: 200px; height: 400px; position: relative; z-index: 10;
    will-change: transform;
    animation: jump 4s cubic-bezier(1, 0, 1, 1) forwards;
  }

  .ring {
    position: absolute; width: 300px; height: 10px; border: 2px solid #38bdf8; border-radius: 50%;
    box-shadow: 0 0 20px #38bdf8, inset 0 0 20px #38bdf8;
    top: 0; z-index: 20; transform: rotateX(70deg);
    animation: scan 2.5s ease-in-out forwards;
  }

  .trail {
    position: absolute; width: 2px; height: 0; background: #fff;
    left: 50%; transform: translateX(-50%); top: 50%;
    animation: light-trail 4s cubic-bezier(1, 0, 1, 1) forwards;
  }

  @keyframes scan {
    0% { top: -20%; opacity: 0; transform: rotateX(70deg) scale(2); }
    20% { opacity: 1; }
    80% { top: 80%; opacity: 1; transform: rotateX(70deg) scale(1); }
    100% { top: 100%; opacity: 0; transform: rotateX(70deg) scale(0); }
  }

  @keyframes jump {
    0% { transform: translateY(0) scaleY(1); }
    60% { transform: translateY(0) scaleY(1); }
    62% { transform: translateY(20px) scaleY(0.9); } /* Wind up */
    65% { transform: translateY(-50px) scaleY(1.5); }
    70% { transform: translateY(-200vh) scaleY(3); }
    100% { transform: translateY(-200vh) scaleY(3); }
  }

  @keyframes light-trail {
    0%, 65% { height: 0; opacity: 1; }
    70% { height: 200vh; opacity: 1; }
    100% { height: 200vh; opacity: 0; }
  }

</style>
</head>
<body>
  <div class="ring"></div>
  <div class="trail"></div>
  <div class="rocket-container">
    <svg viewBox="0 0 100 250" style="width: 100%; height: 100%;">
      <path d="M 50 10 C 35 40 35 100 35 140 L 20 170 L 35 170 L 35 180 L 65 180 L 65 170 L 80 170 L 65 140 C 65 100 65 40 50 10 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <path d="M 40 180 L 40 195 L 60 195 L 60 180" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="50" cy="60" r="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="50" cy="90" r="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    </svg>
  </div>
</body>
</html>
