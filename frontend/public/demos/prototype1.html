<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 1: Blueprint Reveal</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #0c1015;
    background-image: linear-gradient(#1f2937 1px, transparent 1px), linear-gradient(90deg, #1f2937 1px, transparent 1px);
    background-size: 50px 50px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f3f4f6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .container {
    position: relative;
    width: 200px;
    height: 400px;
  }
  svg {
    width: 100%;
    height: 100%;
  }
  .path {
    fill: none;
    stroke: #e5e7eb;
    stroke-width: 2;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: draw 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  .grid-lines {
    fill: none;
    stroke: #374151;
    stroke-width: 1;
    stroke-dasharray: 4;
  }
  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }
  .title {
    margin-top: 40px;
    font-size: 24px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 600;
    opacity: 0;
    animation: fade 1s 2s forwards;
  }
  .bar-container {
    width: 300px;
    height: 4px;
    background: #1f2937;
    margin-top: 20px;
    overflow: hidden;
    opacity: 0;
    animation: fade 0.5s 1.5s forwards;
  }
  .bar {
    height: 100%;
    background: #e5e7eb;
    width: 0%;
    animation: load 2s 1.5s cubic-bezier(0.7, 0, 0.3, 1) forwards;
  }
  @keyframes fade {
    to { opacity: 1; }
  }
  @keyframes load {
    50% { width: 70%; }
    100% { width: 100%; }
  }
</style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 100 200">
      <!-- Blueprint grid -->
      <line x1="50" y1="0" x2="50" y2="200" class="grid-lines" />
      <line x1="0" y1="100" x2="100" y2="100" class="grid-lines" />
      <line x1="0" y1="50" x2="100" y2="50" class="grid-lines" />
      <line x1="0" y1="150" x2="100" y2="150" class="grid-lines" />
      
      <!-- Rocket Outline -->
      <path class="path" d="M 50 10 C 35 40 35 100 35 140 L 20 170 L 35 170 L 35 180 L 65 180 L 65 170 L 80 170 L 65 140 C 65 100 65 40 50 10 Z" />
      <!-- Engine -->
      <path class="path" style="animation-delay: 0.5s;" d="M 40 180 L 40 195 L 60 195 L 60 180" />
      <!-- Windows -->
      <circle cx="50" cy="60" r="6" class="path" style="animation-delay: 1s;" />
      <circle cx="50" cy="90" r="6" class="path" style="animation-delay: 1.2s;" />
    </svg>
  </div>
  <div class="title">Vehicle Assembly</div>
  <div class="bar-container">
    <div class="bar"></div>
  </div>
</body>
</html>
