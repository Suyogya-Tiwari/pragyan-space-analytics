<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 5: Data Waterfall</title>
<style>
  body {
    margin: 0; background: #050505; height: 100vh;
    font-family: "Courier New", monospace; overflow: hidden; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .matrix {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: space-around; opacity: 0.15;
  }
  .column {
    display: flex; flex-direction: column; font-size: 12px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  .overlay {
    background: #fff; color: #000; padding: 20px 40px;
    font-weight: bold; font-family: sans-serif; letter-spacing: 2px;
    z-index: 10; opacity: 0; animation: snapIn 0.5s 1.5s forwards;
  }
  @keyframes snapIn { 
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="matrix" id="matrix"></div>
  <div class="overlay">SYSTEMS SYNCHRONIZED</div>
  <script>
    const m = document.getElementById('matrix');
    for(let i=0; i<30; i++) {
      let col = document.createElement('div');
      col.className = 'column';
      col.style.animationDuration = (Math.random() * 2 + 2) + 's';
      let html = '';
      for(let j=0; j<50; j++) html += `<div>${Math.random().toString(16).substr(2,4).toUpperCase()}</div>`;
      col.innerHTML = html;
      m.appendChild(col);
    }
  </script>
</body>
</html>
